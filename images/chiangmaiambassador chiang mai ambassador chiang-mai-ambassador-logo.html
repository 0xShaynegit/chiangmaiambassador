<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chiang Mai Ambassador Logo</title>
  <style>
    @font-face {
      font-family: 'TrajanPro';
      src: url('../fonts/trajanpro-regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }
    body { margin: 0; padding: 0; background: #FFFFFF; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    svg { max-width: 100%; height: auto; }
  </style>
</head>
<body>
<svg viewBox="-175 -178 350 500" xmlns="http://www.w3.org/2000/svg" width="1400" height="2000">
  <defs>
    <linearGradient id="g2gold" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#F2D980" />
      <stop offset="40%" stop-color="#C49010" />
      <stop offset="100%" stop-color="#9A7008" />
    </linearGradient>
    <linearGradient id="g2ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E4BC50" />
      <stop offset="100%" stop-color="#9A7008" />
    </linearGradient>
    <linearGradient id="g2divider" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C49010" stop-opacity="0" />
      <stop offset="50%" stop-color="#C49010" stop-opacity="1" />
      <stop offset="100%" stop-color="#C49010" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Background - Pure White -->
  <rect width="350" height="500" x="-175" y="-178" fill="#FFFFFF"/>

  <!-- Outer ring -->
  <circle cx="0" cy="0" r="164" fill="none" stroke="url(#g2ring)" stroke-width="2.5" />

  <!-- Inner ring -->
  <circle cx="0" cy="0" r="157" fill="none" stroke="#E4BC50" stroke-width="1" opacity="0.65" />

  <!-- Cardinal accent dots -->
  <circle cx="164" cy="0" r="3.2" fill="#C49010" />
  <circle cx="0" cy="-164" r="3.2" fill="#C49010" />
  <circle cx="-164" cy="0" r="3.2" fill="#C49010" />
  <circle cx="0" cy="164" r="3.2" fill="#C49010" />

  <!-- CHEDI SHAPE (Thai Temple) -->
  <g transform="translate(0, -149.201) scale(1.94980)">
    <!-- Finial tip diamond -->
    <polygon points="0,-4 -3,0 0,4 3,0" fill="#F2D980" />
    <!-- Spire shaft -->
    <rect x="-2" y="4" width="4" height="38" fill="url(#g2gold)" />
    <!-- Upper bell -->
    <polygon points="0,42 -16,78 16,78" fill="url(#g2gold)" />
    <!-- Bell shelf -->
    <rect x="-18" y="78" width="36" height="6" rx="1" fill="#9A7008" />
    <!-- Tier 1 -->
    <rect x="-22" y="84" width="44" height="9" fill="url(#g2gold)" />
    <!-- Tier 1 shelf -->
    <rect x="-25" y="93" width="50" height="4" fill="#9A7008" />
    <!-- Tier 2 -->
    <rect x="-30" y="97" width="60" height="9" fill="url(#g2gold)" />
    <!-- Tier 2 shelf -->
    <rect x="-33" y="106" width="66" height="4" fill="#9A7008" />
    <!-- Tier 3 -->
    <rect x="-38" y="110" width="76" height="9" fill="url(#g2gold)" />
    <!-- Base plinth -->
    <rect x="-44" y="119" width="88" height="11" fill="url(#g2gold)" />
    <!-- Ground platform -->
    <rect x="-52" y="130" width="104" height="8" fill="#9A7008" />
  </g>

  <!-- WORDMARK -->
  <!-- "CHIANG MAI" - centered with natural spacing -->
  <text x="0" y="204" font-family="TrajanPro, Georgia, serif" font-size="34" font-weight="400" fill="#1C1410" text-anchor="middle" letter-spacing="6">CHIANG MAI</text>

  <!-- "AMBASSADOR" - stretched to circle width (314px) via letter-spacing only -->
  <text x="0" y="240" font-family="TrajanPro, Georgia, serif" font-size="34" font-weight="400" fill="#1C1410" text-anchor="middle" textLength="314" lengthAdjust="spacing">AMBASSADOR</text>

  <!-- Gold divider rule -->
  <rect x="-157" y="252" width="314" height="1" fill="url(#g2divider)" />

  <!-- TAGLINE -->
  <!-- Bigger font, stretched to AMBASSADOR width -->
  <text x="0" y="272" font-family="TrajanPro, Georgia, serif" font-size="14" font-weight="400" fill="#1C1410" text-anchor="middle" textLength="314" lengthAdjust="spacing">CONNECTOR · HELPER · GURU</text>
</svg>
</body>
</html>
